<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />

  <title>Admin Login - Cool Senter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Cool Senter</a>
    <nav class="nav-links">
      <a href="index.html">Bosh sahifa</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="hero-card">
      <div class="badge">Admin Login</div>
      <h1>Admin panelga kirish</h1>
      <p>Login ma'lumotlaringizni kiriting va boshqaruv paneliga o'ting. Bu sahifa demo maqsadida yaratilgan.</p>
      <form class="contact-form" action="admin.html" method="get">
        <label>
          Login
          <input type="text" name="username" placeholder="admin" required />
        </label>
        <label>
          Parol
          <input type="password" name="password" placeholder="••••••••" required />
        </label>
        <button class="btn btn-primary" type="submit">Kirish</button>
      </form>
      <div class="actions">
        <a class="btn btn-secondary" href="index.html">Bosh sahifa</a>
      </div>
    </section>
  </main>
</body>
</html>
